# config/services.yaml
parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # Shared Kernel — Command Bus
    SharedKernel\Infrastructure\Messenger\MessengerCommandBus:
        arguments:
            $commandBus: '@command.bus'

    SharedKernel\Application\CommandBusInterface:
        alias: SharedKernel\Infrastructure\Messenger\MessengerCommandBus

    # Shared Kernel — Query Bus
    SharedKernel\Infrastructure\Messenger\MessengerQueryBus:
        arguments:
            $queryBus: '@query.bus'

    SharedKernel\Application\QueryBusInterface:
        alias: SharedKernel\Infrastructure\Messenger\MessengerQueryBus

    # Shared Kernel — Event Bus
    SharedKernel\Infrastructure\Messenger\MessengerEventBus:
        arguments:
            $eventBus: '@event.bus'

    SharedKernel\Application\EventBusInterface:
        alias: SharedKernel\Infrastructure\Messenger\MessengerEventBus

    # CRM package — autoconfigure handlery a services
    Crm\:
        resource: '../packages/crm/src/'
        exclude:
            - '../packages/crm/src/*/Domain/'
            - '../packages/crm/src/*/Infrastructure/Doctrine/Type/'

    Crm\Contacts\Domain\CustomerRepository:
        alias: Crm\Contacts\Infrastructure\Persistence\DoctrineCustomerRepository

    # Shared Kernel Infrastructure — DomainExceptionListener atd.
    SharedKernel\Infrastructure\:
        resource: '../packages/shared-kernel/src/Infrastructure/'

    # Identity package — autoconfigure handlery a services
    Identity\:
        resource: '../packages/identity/src/'
        exclude:
            - '../packages/identity/src/*/Domain/'
            - '../packages/identity/src/*/Infrastructure/Doctrine/Type/'

    Identity\User\Domain\UserRepository:
        alias: Identity\User\Infrastructure\Persistence\DoctrineUserRepository

    Identity\Role\Domain\RoleRepository:
        alias: Identity\Role\Infrastructure\Persistence\DoctrineRoleRepository

    Identity\Auth\Domain\RefreshTokenRepository:
        alias: Identity\Auth\Infrastructure\Persistence\DoctrineRefreshTokenRepository

    Identity\Auth\Application\JwtTokenService:
        alias: Identity\Auth\Infrastructure\Jwt\FirebaseJwtTokenService

    Identity\Auth\Infrastructure\Jwt\FirebaseJwtTokenService:
        arguments:
            $secret: '%env(JWT_SECRET)%'
            $ttl: '%env(int:JWT_TTL)%'

    # Planning package
    Planning\:
        resource: '../packages/planning/src/'
        exclude:
            - '../packages/planning/src/*/Domain/'
            - '../packages/planning/src/*/Infrastructure/Doctrine/Type/'

    Planning\Order\Domain\OrderRepository:
        alias: Planning\Infrastructure\Persistence\DoctrineOrderRepository

    Planning\Worker\Domain\WorkerRepository:
        alias: Planning\Infrastructure\Persistence\DoctrineWorkerRepository

    # Sales package
    Sales\:
        resource: '../packages/sales/src/'
        exclude:
            - '../packages/sales/src/*/Domain/'
            - '../packages/sales/src/*/Infrastructure/Doctrine/Type/'
            - '../packages/sales/src/*/Application/'

    #Sales\Inquiry\Domain\InquiryRepository:
    #    alias: Sales\Inquiry\Infrastructure\Persistence\DoctrineInquiryRepository

    #Sales\Quote\Domain\QuoteRepository:
    #    alias: Sales\Quote\Infrastructure\Persistence\DoctrineQuoteRepository

    Sales\Inquiry\Infrastructure\Storage\FileStorage:
        alias: Sales\Inquiry\Infrastructure\Storage\LocalFileStorage

    Sales\Inquiry\Infrastructure\Storage\LocalFileStorage:
        arguments:
            $uploadDir: '%kernel.project_dir%/var/uploads/sales/attachments'

    #Sales\Quote\Infrastructure\Pdf\QuotePdfGenerator:
    #    arguments:
    #        $outputDir: '%kernel.project_dir%/var/uploads/sales/quotes'

    # Audit package — event handlers
    Audit\:
        resource: '../packages/audit/src/'
        exclude:
            - '../packages/audit/src/*/Domain/'
            - '../packages/audit/src/*/Infrastructure/Doctrine/Type/'
