services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ddd_erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://erp:erp_secret@db:5432/ddd_erp"

volumes:
  postgres_data:
